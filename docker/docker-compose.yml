# docker-compose for macos-kvm

version: "3.8"

services:
  macos-kvm:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        VERSION: sonoma
        RAM: 4
        CORES: 2
        SIZE: 128G
    image: macos-kvm:latest
    devices:
      - /dev/kvm
      - /dev/snd
    environment:
      DISPLAY: "${DISPLAY:-:0}"
      HEADLESS: "${HEADLESS:-0}"
      RAM: "${RAM:-4}"
      CORES: "${CORES:-2}"
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - macos-hdd:/macos-kvm/mac_hdd.qcow2
    ports:
      - "10022:10022"   # SSH into guest
      - "5900:5900"     # VNC (headless mode)

volumes:
  macos-hdd:
